name: Sync LoL Meta Classes

on:
  # Trigger when riot-manifests repository updates
  repository_dispatch:
    types: [manifest-updated]

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if no changes detected'
        required: false
        default: 'false'

  # Fallback: scheduled run every 6 hours
  schedule:
    - cron: '0 */6 * * *'

env:
  CARGO_TERM_COLOR: always
  # Ensure warnings don't cause build failures and include export-dynamic for dumper
  RUSTFLAGS: "-A warnings -C link-args=-Wl,-export-dynamic"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y libc++1 build-essential cmake

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        target: x86_64-unknown-linux-gnu

    - name: Cache cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Build dumper
      run: |
        cargo build --release --bin dumper --target x86_64-unknown-linux-gnu

    - name: Run meta-sync
      run: |
        cargo run --release --bin meta-sync
      env:
        RUST_LOG: info
        DUMPER_PATH: ${{ github.workspace }}/target/x86_64-unknown-linux-gnu/release/dumper

    - name: Detect new dumps
      id: changes
      run: |
        # Detect new untracked dump files
        NEW_DUMPS=$(git ls-files --others --exclude-standard -- 'dumps/*.json')
        # Detect modified dump files
        MODIFIED_DUMPS=$(git diff --name-only -- 'dumps/*.json')

        ALL_CHANGED=$(echo -e "${NEW_DUMPS}\n${MODIFIED_DUMPS}" | grep -v '^$' | sort -u)

        if [ -z "$ALL_CHANGED" ]; then
          echo "changes=false" >> $GITHUB_OUTPUT
          echo "No new or modified dumps detected."
        else
          echo "changes=true" >> $GITHUB_OUTPUT
          echo "Changed dumps:"
          echo "$ALL_CHANGED"

          # Extract version from the latest changed dump
          LATEST_VERSION=$(echo "$ALL_CHANGED" \
            | grep -E '^dumps/[0-9]+\.[0-9]+\.[0-9]+\.json$' \
            | sed -E 's#^dumps/([0-9]+\.[0-9]+\.[0-9]+)\.json$#\1#' \
            | sort -V \
            | tail -1)
          echo "latest_version=${LATEST_VERSION}" >> $GITHUB_OUTPUT

          # Save list of changed files for release upload
          echo "$ALL_CHANGED" > /tmp/changed_dumps.txt
        fi

    - name: Validate dump sizes
      if: steps.changes.outputs.changes == 'true'
      run: |
        set -e
        MAX_SIZE_MB=50
        while IFS= read -r file; do
          SIZE_BYTES=$(stat --format=%s "$file")
          SIZE_MB=$((SIZE_BYTES / 1048576))
          echo "$file: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt "$MAX_SIZE_MB" ]; then
            echo "ERROR: $file is ${SIZE_MB}MB, exceeding ${MAX_SIZE_MB}MB limit. Dump is likely corrupted."
            exit 1
          fi
        done < /tmp/changed_dumps.txt
        echo "All dumps are within size limits."

    - name: Create GitHub Release with dumps
      if: steps.changes.outputs.changes == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -e
        VERSION="${{ steps.changes.outputs.latest_version }}"
        TAG="v${VERSION}"

        # Check if release already exists
        if gh release view "$TAG" &>/dev/null; then
          echo "Release $TAG already exists, updating assets..."
          while IFS= read -r file; do
            BASENAME=$(basename "$file")
            # Delete existing asset if present, then upload new one
            gh release delete-asset "$TAG" "$BASENAME" --yes 2>/dev/null || true
            gh release upload "$TAG" "$file"
          done < /tmp/changed_dumps.txt
        else
          echo "Creating release $TAG..."
          ASSET_ARGS=""
          while IFS= read -r file; do
            ASSET_ARGS="$ASSET_ARGS $file"
          done < /tmp/changed_dumps.txt

          gh release create "$TAG" \
            --title "LoL Meta Classes ${VERSION}" \
            --notes "Meta class dumps for League of Legends version ${VERSION}" \
            $ASSET_ARGS
        fi

    - name: Regenerate db/database.py from latest dump
      if: steps.changes.outputs.changes == 'true' || github.event.inputs.force_run == 'true'
      run: |
        set -e
        if [ ! -d "dumps" ] || [ -z "$(ls -1 dumps/*.json 2>/dev/null || true)" ]; then
          echo "No dumps found, skipping database regeneration."
          exit 0
        fi

        LATEST_DUMP=$(ls -1 dumps/*.json | sort -V | tail -1)
        echo "Using latest dump: ${LATEST_DUMP}"

        # Ensure db directory exists
        mkdir -p db

        # Generate/update the database file
        python3 scripts/db_import.py db/database.py "${LATEST_DUMP}"

    - name: Commit and push database and dump updates
      if: steps.changes.outputs.changes == 'true' || github.event.inputs.force_run == 'true'
      run: |
        set -e
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        # Stage dump files and database
        git add dumps/

        if ! git diff --quiet -- db/database.py 2>/dev/null; then
          git add db/database.py
        fi

        # Check if there's anything to commit
        if git diff --cached --quiet; then
          echo "No changes to commit."
          exit 0
        fi

        VERSION="${{ steps.changes.outputs.latest_version }}"
        if [ -n "$VERSION" ]; then
          COMMIT_MSG="chore(dumper): ${VERSION}"
        else
          COMMIT_MSG="Update LoL meta classes"
        fi

        git commit -m "$COMMIT_MSG"
        git push

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lol-meta-dumps-${{ github.run_id }}
        path: |
          dumps/
        retention-days: 30
