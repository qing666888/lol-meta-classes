name: Sync LoL Meta Classes

on:
  # Trigger when riot-manifests repository updates
  repository_dispatch:
    types: [manifest-updated]
  
  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if no changes detected'
        required: false
        default: 'false'

  # Fallback: scheduled run every 6 hours
  schedule:
    - cron: '0 */6 * * *'

env:
  CARGO_TERM_COLOR: always
  # Ensure warnings don't cause build failures and include export-dynamic for dumper
  RUSTFLAGS: "-A warnings -C link-args=-Wl,-export-dynamic"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y libc++1 build-essential cmake

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        target: x86_64-unknown-linux-gnu

    - name: Cache cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Build dumper
      run: |
        cargo build --release --bin dumper --target x86_64-unknown-linux-gnu

    - name: Run meta-sync
      run: |
        cargo run --release --bin meta-sync
      env:
        # Add any environment variables needed by your sync script
        RUST_LOG: info

    - name: Check for changes
      id: changes
      run: |
        # First detect tracked file changes
        if ! git diff --quiet -- dumps/; then
          echo "changes=true" >> $GITHUB_OUTPUT
          echo "Tracked changes detected in dumps/"
          git diff --name-status -- dumps/
          exit 0
        fi

        # Also detect untracked files (new dumps not yet added to Git)
        if [ -n "$(git ls-files --others --exclude-standard -- dumps/)" ]; then
          echo "changes=true" >> $GITHUB_OUTPUT
          echo "Untracked files detected in dumps/"
          git ls-files --others --exclude-standard -- dumps/
        else
          echo "changes=false" >> $GITHUB_OUTPUT
          echo "No changes detected in dumps/"
        fi

    - name: Commit and push changes
      if: steps.changes.outputs.changes == 'true' || github.event.inputs.force_run == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add dumps/
        git add temp/ || true  # Add temp files if they should be committed
        
        # Create commit message with version info from actually changed files
        CHANGED_FILES=$( (git diff --name-only -- dumps/; git ls-files --others --exclude-standard -- dumps/) | sort -u )
        LATEST_FROM_CHANGES=$(echo "$CHANGED_FILES" \
          | grep -E '^dumps/[0-9]+\.[0-9]+\.[0-9]+\.json$' \
          | sed -E 's#^dumps/([0-9]+\.[0-9]+\.[0-9]+)\.json$#\1#' \
          | sort -V \
          | tail -1)

        if [ -n "$LATEST_FROM_CHANGES" ]; then
          COMMIT_MSG="chore(dumper): ${LATEST_FROM_CHANGES}"
        elif [ -d "dumps" ] && [ "$(ls -A dumps/)" ]; then
          LATEST_VERSION=$(ls dumps/ | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.json$' | sort -V | tail -1 | sed 's/\.json$//')
          COMMIT_MSG="chore(dumper): ${LATEST_VERSION}"
        else
          COMMIT_MSG="Update LoL meta classes"
        fi

        git commit -m "$COMMIT_MSG" || exit 0
        
        git push

    - name: Regenerate db/database.py from latest dump
      if: steps.changes.outputs.changes == 'true' || github.event.inputs.force_run == 'true'
      run: |
        set -e
        if [ ! -d "dumps" ] || [ -z "$(ls -1 dumps/*.json 2>/dev/null || true)" ]; then
          echo "No dumps found, skipping database regeneration."
          exit 0
        fi

        LATEST_DUMP=$(ls -1 dumps/*.json | sort -V | tail -1)
        echo "Using latest dump: ${LATEST_DUMP}"

        # Ensure db directory exists
        mkdir -p db

        # Generate/update the database file
        python3 scripts/db_import.py db/database.py "${LATEST_DUMP}"

    - name: Commit and push database update
      if: steps.changes.outputs.changes == 'true' || github.event.inputs.force_run == 'true'
      run: |
        set -e
        if git diff --quiet -- db/database.py; then
          echo "No changes to db/database.py"
          exit 0
        fi

        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add db/database.py

        # Use latest dump version in commit message if available
        if [ -d "dumps" ] && [ -n "$(ls -1 dumps/*.json 2>/dev/null || true)" ]; then
          VERSION=$(ls -1 dumps/*.json | sort -V | tail -1 | xargs -n1 basename | sed 's/\.json$//')
          git commit -m "chore(db): update database.py from ${VERSION}"
        else
          git commit -m "chore(db): update database.py"
        fi

        git push

    - name: Create release on major version change
      if: steps.changes.outputs.changes == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // Get latest version from dumps directory
          try {
            const dumpsDir = 'dumps';
            const files = fs.readdirSync(dumpsDir);
            const versionFiles = files.filter(f => /^\d+\.\d+\.\d+\.json$/.test(f));
            
            if (versionFiles.length > 0) {
              const latestVersion = versionFiles.sort((a, b) => {
                const versionA = a.replace('.json', '');
                const versionB = b.replace('.json', '');
                return versionA.localeCompare(versionB, undefined, { numeric: true });
              }).pop();
              
              const version = latestVersion.replace('.json', '');
              const [major, minor, patch] = version.split('.').map(Number);
              
              // Check if this is a new major version (you can adjust this logic)
              const previousVersions = versionFiles.map(f => f.replace('.json', ''));
              const isNewMajor = !previousVersions.some(v => {
                const [prevMajor] = v.split('.').map(Number);
                return prevMajor === major && v !== version;
              });
              
              if (isNewMajor) {
                await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: `v${version}`,
                  name: `LoL Meta Classes v${version}`,
                  body: `Updated meta classes for League of Legends version ${version}`,
                  draft: false,
                  prerelease: false
                });
                
                console.log(`Created release for version ${version}`);
              }
            }
          } catch (error) {
            console.log('Could not create release:', error.message);
          }

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lol-meta-dumps-${{ github.run_id }}
        path: |
          dumps/
        retention-days: 30
